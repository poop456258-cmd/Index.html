<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>專業數獨大師 - 連惠香小姐專屬版</title>
    <style>
        :root {
            --bg-color: #f6f8f9;
            --grid-line: #34495e;
            --text-color: #2c3e50;
            --input-color: #3498db; /* 藍色數字 */
            --error-color: #e74c3c; /* 紅色錯誤 */
            --selected-bg: #e3f2fd; /* 點選區域 */
            --highlight-same: #bbdefb; /* 相同數字 */
            --highlight-axis: #f1f8e9; /* 行列高亮 */
            
            /* 關鍵：使用動態計算確保在手機可視範圍內 */
            --base-unit: min(11vw, 5vh, 45px); /* 根據螢幕寬高自動縮放格子 */
            --cell-size: var(--base-unit);
            --key-height: min(12vw, 6vh, 55px); /* 數字鍵盤高度 */
        }

        /* 基礎設定 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg-color); color: var(--text-color); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; height: calc(100vh - env(safe-area-inset-bottom)); /* 適配 iPhone 安全區域 */
            width: 100vw; overflow: hidden; /* 防止捲動 */
            -webkit-user-select: none; user-select: none; 
        }

        /* 主容器：限制最大寬度並居中 */
        .main-container {
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            width: 100%; max-width: 500px; height: 100%;
            padding: min(2vh, 15px) 10px;
        }

        /* 上方資訊列 */
        .info-bar { 
            display: flex; justify-content: space-between; width: 100%; 
            margin-bottom: 5px; font-size: min(3.5vw, 0.9rem); color: #7f8c8d; 
            padding: 0 5px;
        }
        .info-item { display: flex; align-items: center; gap: 3px; }

        /* 數獨棋盤容器：確保水平居中 */
        .grid-wrapper { display: flex; justify-content: center; width: 100%; }

        /* 數獨棋盤 */
        #sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            border: 2px solid var(--grid-line);
            background-color: var(--grid-line);
            gap: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            /* 確保棋盤不會超出螢幕寬度 */
            max-width: 100%;
        }
        
        .cell {
            width: var(--cell-size); height: var(--cell-size);
            background: #fff; display: flex; align-items: center; justify-content: center;
            font-size: calc(var(--cell-size) * 0.55); cursor: pointer; position: relative;
        }

        /* 區隔粗線 */
        .cell:nth-child(3n) { border-right: 1px solid var(--grid-line); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--grid-line); }

        /* 樣式狀態 */
        .cell.fixed { font-weight: bold; }
        .cell.inputted { color: var(--input-color); }
        .cell.error { color: var(--error-color) !important; animation: shake 0.3s; }
        .cell.selected { background: var(--selected-bg) !important; }
        .cell.highlight-axis { background: var(--highlight-axis); } /* 行列高亮 */
        .cell.highlight-same { background: var(--highlight-same) !important; }

        /* 筆記（草稿）小數字 */
        .note { position: absolute; font-size: calc(var(--cell-size) * 0.25); color: #95a5a6; top: 2px; left: 2px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; width: 90%; height: 90%; pointer-events: none; }
        .note-num { display: flex; align-items: center; justify-content: center; }

        /* 功能按鈕區 */
        .tools-bar { display: flex; justify-content: space-around; width: 100%; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .tool-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #7f8c8d; cursor: pointer; flex: 1; }
        .tool-icon { font-size: min(6vw, 1.4rem); }
        .tool-text { font-size: min(3vw, 0.7rem); }
        .tool-btn.active { color: var(--input-color); font-weight: bold;}
        #note-mode-status { font-size: 0.6rem; color: #95a5a6; }

        /* 數字鍵盤 */
        .keypad-wrapper { width: 100%; display: flex; justify-content: center; margin-top: auto; padding-bottom: 5px; }
        .keypad { display: flex; justify-content: space-between; gap: 4px; width: 100%; }
        .key { flex: 1; height: var(--key-height); background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: calc(var(--key-height) * 0.5); color: var(--input-color); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid #f0f0f0; }
        .key.completed { opacity: 0.2; color: #bdc3c7; pointer-events: none; } /* 已填滿的數字 */
        .key:active { background: #fafafa; transform: scale(0.98); }

        /* 電池百分比 ( decorative ) */
        .battery-icon { font-size: 0.8rem; margin-left: 5px; color: #27ae60; }

        /* 動畫與過關遮罩 */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-3px); } 40%, 80% { transform: translateX(3px); } }
        #win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); color: var(--text-color); flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .win-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; color: #27ae60; }
        .win-name { font-size: 1.2rem; margin-bottom: 30px; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        #golf-anim { font-size: 6rem; margin-bottom: 40px; animation: golfSwing 2s infinite; }
        @keyframes golfSwing { 0% { transform: rotate(-30deg); } 50% { transform: rotate(10deg) translateX(10px); } 100% { transform: rotate(-30deg); } }
        .restart-btn { background: #27ae60; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="info-bar">
        <div class="info-item">容易 <span id="time">16:10</span></div>
        <div class="info-item">錯誤: <span id="error-count">0</span>/3</div>
        <div class="info-item">🔋 95%</div>
    </div>

    <div class="grid-wrapper">
        <div id="sudoku-grid"></div>
    </div>

    <div class="tools-bar">
        <div class="tool-btn" onclick="undo()">
            <span class="tool-icon">↩️</span>
            <span class="tool-text">撤銷</span>
        </div>
        <div class="tool-btn" onclick="eraseCell()">
            <span class="tool-icon">🧹</span>
            <span class="tool-text">擦除</span>
        </div>
        <div class="tool-btn" id="note-btn" onclick="toggleNoteMode()">
            <span class="tool-icon">✏️</span>
            <span class="tool-text">筆記 <span id="note-mode-status">關</span></span>
        </div>
        <div class="tool-btn" onclick="startNewGame()">
            <span class="tool-icon">🆕</span>
            <span class="tool-text">新遊戲</span>
        </div>
    </div>

    <div class="keypad-wrapper">
        <div class="keypad">
            <div class="key" id="key-1" onclick="pressNumber(1)">1</div>
            <div class="key" id="key-2" onclick="pressNumber(2)">2</div>
            <div class="key" id="key-3" onclick="pressNumber(3)">3</div>
            <div class="key" id="key-4" onclick="pressNumber(4)">4</div>
            <div class="key" id="key-5" onclick="pressNumber(5)">5</div>
            <div class="key" id="key-6" onclick="pressNumber(6)">6</div>
            <div class="key" id="key-7" onclick="pressNumber(7)">7</div>
            <div class="key" id="key-8" onclick="pressNumber(8)">8</div>
            <div class="key" id="key-9" onclick="pressNumber(9)">9</div>
        </div>
    </div>
</div>
